<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🎬 Mi Cine</div>
        <ul>
            <li><a href="index.html">Inicio</a></li>
        </ul>
    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="contenedor">

        <!-- SLIDER -->
        <div class="slider">
            <div class="slides">
                <img src="img/interestellarhoriz.jpg" alt="Imagen 1">
                <img src="img/lalalandHor.jpg" alt="Imagen 2">
                <img src="img/avatarHor.jpg" alt="Imagen 3">
                <img src="img/cocoHor.jpg" alt="Imagen 4">
            </div>
        </div>

        <!-- FORMULARIO -->
        <div class="login-box">
            <h2>Iniciar sesión</h2>

            <form id="formLogin" class="form-cliente">

                <label>Email</label>
                <input type="email" id="emailLogin" required>

                <label>Contraseña</label>
                <input type="password" id="passwordLogin" required>

                <button type="submit">Entrar</button>

                <p id="mensajeLogin"></p>
                <p>¿No tienes cuenta? <a href="nuevoCliente.html">Crear una cuenta</a></p>
            </form>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Mi Cine — Todos los derechos reservados</p>
    </footer>

    <script type="module" src="js/login.js"></script>
</body>
</html>
