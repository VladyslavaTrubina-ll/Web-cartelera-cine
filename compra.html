<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra de entradas</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<h2>Compra de entradas</h2>

<div id="infoPelicula"></div>

<!-- Selección de fecha -->
<label for="selectFecha">Selecciona fecha:</label>
<select id="selectFecha"></select>

<!-- Selección de hora -->
<label for="selectHora">Selecciona hora:</label>
<select id="selectHora"></select>

<!-- Cantidad -->
<label for="cantidad">Cantidad de entradas:</label>
<input type="number" id="cantidad" min="1" value="1">

<!-- Total calculado automáticamente -->
<p id="precioTotal"></p>

<!-- Pago -->
<label for="pago">Introduce el importe a pagar (€):</label>
<input type="number" id="pago" min="0" step="0.01">

<!-- Botón de compra -->
<button id="btnComprar">Confirmar compra</button>

<!-- Mensaje final -->
<p id="mensajeCompra"></p>

<script type="module" src="js/compra.js"></script>
</body>
</html>
