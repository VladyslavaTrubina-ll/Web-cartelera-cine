<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Purchase</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <script type="module" src="js/header.js"></script>
    <script type="module" src="js/compra.js"></script>
    <script type="module" src="js/futer.js"></script>
  </head>
  <body>
    <header id="header"></header>

    <div class="info-compra">
      <p>You selected: <span id="pelicula-nombre"></span></p>

      <div class="sesion-info">
        <p>Date: <span id="sesion-fecha"></span></p>
        <p>Start time: <span id="sesion-horaInicio"></span></p>
        <p>End time: <span id="sesion-horaFinal"></span></p>
        <p>Hall: <span id="sesion-sala"></span></p>
      </div>
      <div class="entrada-info">
        <p>Price per ticket: <span id="precioUnitario"></span></p>
        <p>Number of tickets: <span id="cantidadEntradas"></span></p>
        <p>Discount applied: <span id="descuentoAplicado"></span></p>
      </div>
      <p>Total price: <span id="precioTotal"></span></p>
    </div>

    <div class="pago">
      <!-- Pago -->
      <form id="form-pago" action="/factura.html" method="get">
        <label for="importe">Enter payment amount (€):</label>
        <input type="number" id="importe" min="0" step="0.01" name="importe" />
      </form>

      <!-- Botón de compra -->
      <button id="btnPagar" disabled>Confirm purchase</button>
    </div>

    <!-- Mensaje final -->
    <p id="mensajeCompra"></p>
  </body>
</html>
