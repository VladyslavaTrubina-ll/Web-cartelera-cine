<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CinePlus</title>

    <link rel="stylesheet" href="css/decoracionBasica.css">
</head>
<body>

    <!-- Portada -->
    <header class="hero">
        <div class="header-content">
            <h1 class="titulo">Elorrieta Cinema</h1>
            <img src="img/Logo.png" alt="Logo CinePlus" class="logo">
        </div>
    </header>

    <!-- Navbar -->
    <nav class="navbar">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="nuevoCliente.html">Regístrate</a></li>
        </ul>
    </nav>

    <main class="layout">

        <!-- Video Hero -->
        <section class="hero-video">
            <video src="avatar video.mp4" autoplay muted loop playsinline></video>
            <div class="overlay"></div>
            <h2 class="hero-text">Disfruta del mejor cine</h2>
        </section>

        <!-- Tarjeta de Login -->
        <section class="login-box">
            <h2>Iniciar sesión</h2>

            <form id="formLogin" class="form-cliente">

                <label>Email</label>
                <input type="email" id="emailLogin" required>

                <label>Contraseña</label>
                <input type="password" id="passwordLogin" required>

                <button type="submit">Entrar</button>

                <p id="mensajeLogin"></p>
                <p>¿No tienes cuenta? <a href="nuevoCliente.html">Crear una cuenta</a></p>
            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Elorrieta Cinema. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
