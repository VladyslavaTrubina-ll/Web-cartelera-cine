<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CinePlus</title>

    <!-- ENLACE CORRECTO AL CSS -->
    <link rel="stylesheet" href="css/decoracionBasica.css">
</head>
<body>

    <!-- Portada -->
    <header class="hero">
        <img src="img/Logo.png" alt="Logo CinePlus" class="logo">
<img src="img/promocion.png" alt="Logo CinePlus" class="logo">

        
        <h1 class="titulo">Elorrieta Cinema</h1>
    </header>

    <!-- Navbar -->
    <nav class="navbar">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="nuevoCliente.html">Regístrate</a></li>
        </ul>
    </nav>

    <main class="layout">

    <!-- Video Hero -->
    <section class="hero-video">
        <video src="avatar video.mp4" autoplay muted loop playsinline></video>
        <div class="overlay"></div>
        <h2 class="hero-text">Disfruta del mejor cine</h2>
    </section>

    <!-- Tarjeta de Login -->
    <section class="login-card">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" required>

            <button type="submit">Entrar</button>
        </form>
    </section>

</main>


    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 CinePlus. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
