<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Entradas - Cine Elorrieta</title>
    <!-- Usamos tu hoja de estilos -->
    <link rel="stylesheet" href="css/estilos.css">
    
    <style>
        /* Un par de estilos extra para el desplegable de entradas */
        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            width: 100px;
            margin-right: 10px;
        }
        .info-seleccion {
            background-color: #e50914; /* Rojo fondo */
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>🎬 Cine Elorrieta</h1>
    <p>Bienvenido, <span id="nombreUsuario" style="font-weight: bold;">Usuario Invitado</span></p>

    <!-- PASO 1: ELEGIR PELÍCULA (Ahora es el primero) -->
    <div id="div-peliculas" class="seccion">
        <h3>1. Cartelera: ¿Qué quieres ver hoy?</h3>
        <div id="contenedor-botones-peliculas" class="grid-peliculas">
            <!-- JS inyectará aquí las pelis de Cine Elorrieta -->
        </div>
    </div>

    <!-- PASO 2: ELEGIR SESIÓN (Oculto al principio) -->
    <div id="div-sesiones" class="seccion oculto">
        <h3>2. Elige la sesión para <span id="titulo-peli-seleccionada" style="color: #e50914;"></span>:</h3>
        <div id="contenedor-botones-sesiones"></div>
    </div>

    <!-- PASO 3: CANTIDAD DE ENTRADAS (Oculto al principio) -->
    <div id="div-cantidad" class="seccion oculto">
        <h3>3. ¿Cuántas entradas quieres?</h3>
        
        <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
            <label for="num-entradas">Número de personas:</label>
            <!-- Desplegable del 1 al 10 -->
            <select id="num-entradas">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>

        <br>
        <p>Sesión elegida: <span id="resumen-hora" class="info-seleccion"></span></p>
        
        <button class="boton-confirmar" onclick="irAlResumen()">CONTINUAR A PAGAR ➡</button>
    </div>

    <script>
        // --- 1. DATOS (Solo Cine Elorrieta) ---
        // Al ser solo un cine, simplificamos el acceso a los datos
        const cineElorrieta = {
            nombre: "Cine Elorrieta",
            peliculas: [
                { 
                    titulo: "Hulk", 
                    sesiones: ["16:00", "18:00", "20:00"], 
                    precio: 7.50,
                    imagen: "img/laAsistenta.jpg", 
                },
                { 
                    titulo: "Barbie", 
                    sesiones: ["17:00", "19:00"], 
                    precio: 8.00,
                    imagen: "img/barbie.webp"
                },
                { 
                    titulo: "Oppenheimer",
                    sesiones: ["18:30", "21:00"], 
                    precio: 9.00,
                    imagen: "img/ahoraMeVes.jpg" 
                }
            ]
        };

        // Variables globales para guardar la selección
        let peliculaElegida = null;
        let horaElegida = null;

        // --- 2. AL CARGAR LA PÁGINA ---
        window.onload = function() {
            // Recuperar usuario
            const usuario = localStorage.getItem("usuarioLogueado");
            if (usuario) {
                document.getElementById("nombreUsuario").innerText = usuario;
            }

            // CARGAR PELÍCULAS DIRECTAMENTE
            cargarPeliculas();
        };

        // --- 3. FUNCIONES ---

        function cargarPeliculas() {
            const contenedor = document.getElementById("contenedor-botones-peliculas");
            
            cineElorrieta.peliculas.forEach((peli, index) => {
                // Creamos la tarjeta (igual que antes pero con diseño mejorado)
                const tarjeta = document.createElement("div");
                tarjeta.className = "tarjeta-peli";
                // Añadimos estilo inline para que se vea bien como tarjeta
                tarjeta.style.border = "1px solid #ccc";
                tarjeta.style.padding = "10px";
                tarjeta.style.margin = "10px";
                tarjeta.style.display = "inline-block";
                tarjeta.style.width = "150px";
                tarjeta.style.cursor = "pointer";
                tarjeta.style.backgroundColor = "white";
                tarjeta.style.color = "black";
                tarjeta.style.borderRadius = "8px";

                tarjeta.innerHTML = `
                    <img src="${peli.imagen}" style="width:100%; height:200px; object-fit:cover; border-radius:5px;">
                    <h4>${peli.titulo}</h4>
                    <p>${peli.precio}€</p>
                `;

                tarjeta.onclick = function() {
                    seleccionarPelicula(index);
                };

                contenedor.appendChild(tarjeta);
            });
        }

        function seleccionarPelicula(index) {
            peliculaElegida = cineElorrieta.peliculas[index];
            
            // Actualizar interfaz
            document.getElementById("titulo-peli-seleccionada").innerText = peliculaElegida.titulo;
            document.getElementById("div-sesiones").classList.remove("oculto");
            document.getElementById("div-cantidad").classList.add("oculto"); // Ocultar paso 3 por si cambia de peli

            // Generar botones de hora
            const contenedor = document.getElementById("contenedor-botones-sesiones");
            contenedor.innerHTML = ""; // Limpiar anteriores

            peliculaElegida.sesiones.forEach(hora => {
                const boton = document.createElement("button");
                boton.innerText = hora;
                boton.className = "boton-opcion";
                boton.onclick = function() {
                    seleccionarSesion(hora);
                };
                contenedor.appendChild(boton);
            });
            
            // Scroll suave hacia abajo
            document.getElementById("div-sesiones").scrollIntoView({behavior: "smooth"});
        }

        function seleccionarSesion(hora) {
            horaElegida = hora;
            
            // Mostrar paso 3
            document.getElementById("div-cantidad").classList.remove("oculto");
            document.getElementById("resumen-hora").innerText = hora;
            
            // Scroll suave hacia abajo
            document.getElementById("div-cantidad").scrollIntoView({behavior: "smooth"});
        }

        function irAlResumen() {
            // Capturar la cantidad del desplegable
            const cantidad = document.getElementById("num-entradas").value;

            // Guardar en la mochila
            localStorage.setItem("cine", "Cine Elorrieta"); // Fijo
            localStorage.setItem("pelicula", peliculaElegida.titulo);
            localStorage.setItem("precio", peliculaElegida.precio);
            localStorage.setItem("hora", horaElegida);
            localStorage.setItem("cantidad", cantidad); // NUEVO DATO

            // Ir al ticket
            window.location.href = "resumen.html";
        }

    </script>
</body>
</html>
