<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Elorrieta</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <header class="logo-container">
        <figure>
            <img src="img/Logo.png" alt="Logo de Cine Elorrieta" class="logo">
        </figure>
    </header>


    <div class="card">
        <h2>Regístrate para entrar<br>a Cines Elorrieta </h2>
        <form id="formularioAcceso" novalidate>
            <!--Este atributo booleano indica que el formulario no debe validarse cuando se envía.-->
            <div class="form-group">
                <label for="nombreUsuario">Nombre y Apellidos:</label>
                <input type="text" id="nombreUsuario" placeholder="Ej. Ana García">
            </div>

            <div class="form-group">
                <label for="contraseña">Contraseña:</label>
                <input type="text" id="contraseña" placeholder="Ej. 1234">
            </div>

            <button type="submit">Verificar Entrada</button>
        </form>

        <!-- Aquí mostraremos el resultado manipulando el DOM (U3.11) -->
        <div id="mensajeResultado"></div>

        <script src="script.js"></script> <!-- Enlace al JavaScript -->
</body>

</html>
