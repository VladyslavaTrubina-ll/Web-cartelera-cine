<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/estilos.css" />
    <script type="module" src="js/header.js"></script>
    <script type="module" src="js/futer.js"></script>
  </head>

  <body>
    <header id="header"></header>

    <div class="contenedor">
      <!-- SLIDER -->
      <div class="slider">
        <div class="slides">
          <img src="img/interestellarhoriz.jpg" alt="Image 1" />
          <img src="img/lalalandHor.jpg" alt="Image 2" />
          <img src="img/avatarHor.jpg" alt="Image 3" />
          <img src="img/cocoHor.jpg" alt="Image 4" />
          <img src="img/interestellarhoriz.jpg" alt="Image 5" />
          <img src="img/lalalandHor.jpg" alt="Image 6" />
        </div>
      </div>

      <!-- FORMULARIO -->
      <div class="login-box">
        <h2>Sign in</h2>

        <form id="formLogin" class="form-cliente">
          <label>Email</label>
          <input type="email" id="emailLogin" required />

          <label>Password</label>
          <input type="password" id="passwordLogin" required />

          <button type="submit">Sign in</button>

          <p id="mensajeLogin"></p>
          <p>
            Don't have an account? <a href="nuevoCliente.html">Create one</a>
          </p>
        </form>
      </div>
    </div>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
