<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de película</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <script type="module" src="js/header.js"></script>
    <script type="module" src="js/pelicula.js"></script>
    <script type="module" src="js/futer.js"></script>
  </head>

  <body>
    <header id="header"></header>

    <main class="pelicula">
      <div id="info-pelicula"></div>

      <div class="compra">
        <h2>Compra de entradas</h2>

        <!-- Selección de fecha -->
        <div class="section-radio">
          <h3>Selecciona fecha:</h3>

          <div class="radio-wrapper" id="selectFecha"></div>
        </div>

        <form id="form-sesion" action="/compra.html" method="get">
          <div class="section-radio">
            <h3>Selecciona hora:</h3>

            <div class="radio-wrapper" id="selectSesion"></div>
          </div>

          <div class="section-user-input">
            <div class="cantidad-entradas">
              <label for="cantidad">Cantidad de entradas:</label>
              <input
                type="number"
                id="cantidad"
                name="cantidad"
                min="0"
                max="100"
                value="0"
                disabled
              />
              <span id="mensaje-error"></span>
            </div>

            <p id="precioTotal"></p>

            <button type="submit" id="btnPagar" disabled>Pagar</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
